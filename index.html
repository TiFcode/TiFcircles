<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TiFcircles</title>
<meta property="og:title" content="TiFcircles">
<meta property="og:description" content="Tap the biggest animated circle before it changes.">
<meta property="og:type" content="website">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg1: #0f172a;
    --bg2: #111827;
    --bg3: #1d4ed8;
    --glass: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.18);
    --text: #f8fafc;
    --muted: rgba(248,250,252,0.78);
    --danger: #fb7185;
    --success: #34d399;
    --warn: #fbbf24;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(96, 165, 250, 0.25), transparent 30%),
      radial-gradient(circle at 85% 25%, rgba(244, 114, 182, 0.18), transparent 28%),
      radial-gradient(circle at 50% 90%, rgba(52, 211, 153, 0.16), transparent 35%),
      linear-gradient(160deg, var(--bg1), var(--bg2) 48%, var(--bg3));
    color: var(--text);
  }

  body {
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  .app {
    width: min(1100px, 100%);
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    padding: 16px;
    gap: 14px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 22px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .title-wrap h1 {
    font-size: clamp(24px, 4vw, 34px);
    line-height: 1;
    margin-bottom: 6px;
  }

  .title-wrap p {
    color: var(--muted);
    font-size: 14px;
  }

  .stats {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .pill {
    min-width: 92px;
    padding: 10px 14px;
    text-align: center;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.14);
    font-weight: 700;
    font-size: 14px;
  }

  .pill small {
    display: block;
    font-size: 11px;
    opacity: 0.7;
    font-weight: 600;
    margin-top: 2px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  button {
    border: 0;
    border-radius: 999px;
    padding: 12px 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    color: var(--text);
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.14);
    transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 8px 18px rgba(0,0,0,0.18);
  }

  button:hover, button:focus-visible {
    transform: translateY(-1px);
    background: rgba(255,255,255,0.18);
    outline: none;
  }

  button:active {
    transform: scale(0.97);
  }

  .primary {
    background: linear-gradient(135deg, #22c55e, #14b8a6);
    color: white;
  }

  .board-shell {
    flex: 1;
    min-height: 0;
    position: relative;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 18px 45px rgba(0,0,0,0.24);
  }

  #board {
    position: absolute;
    inset: 0;
  }

  .disc {
    position: absolute;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.22);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 26px;
    color: rgba(255,255,255,0.95);
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
    transform: translate(-50%, -50%) scale(1);
    box-shadow:
      inset -14px -18px 24px rgba(0,0,0,0.16),
      inset 10px 10px 24px rgba(255,255,255,0.18),
      0 18px 40px rgba(0,0,0,0.28);
    transition: opacity 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
  }

  .disc::after {
    content: '';
    position: absolute;
    inset: 12%;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, rgba(255,255,255,0.65), rgba(255,255,255,0.08) 45%, transparent 60%);
    pointer-events: none;
  }

  .disc.highlight {
    box-shadow:
      inset -14px -18px 24px rgba(0,0,0,0.16),
      inset 10px 10px 24px rgba(255,255,255,0.18),
      0 18px 40px rgba(0,0,0,0.28);
  }

  .disc.popped {
    pointer-events: none;
    animation: popOut 240ms ease forwards;
  }

  .disc.wrong {
    animation: wrongShake 360ms ease;
  }

  .hud {
    position: absolute;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    z-index: 10;
    width: min(92%, 780px);
    padding: 14px 16px;
    border-radius: 20px;
    background: rgba(8, 15, 32, 0.5);
    border: 1px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 12px 35px rgba(0,0,0,0.24);
  }

  .message {
    font-size: clamp(16px, 2.5vw, 22px);
    font-weight: 800;
  }

  .submessage {
    margin-top: 6px;
    color: var(--muted);
    font-size: 14px;
  }

  .flash {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 16px 22px;
    border-radius: 20px;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    background: rgba(15, 23, 42, 0.82);
    border: 1px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    z-index: 12;
  }

  .flash.show {
    animation: flashInOut 1s ease;
  }

  .confetti {
    position: absolute;
    width: 10px;
    height: 18px;
    border-radius: 999px;
    pointer-events: none;
    opacity: 0.95;
    z-index: 11;
  }

  @keyframes popOut {
    to {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.35);
      filter: blur(1.5px);
    }
  }

  @keyframes wrongShake {
    0%, 100% { transform: translate(-50%, -50%) scale(var(--disc-scale, 1)); }
    20% { transform: translate(calc(-50% - 8px), -50%) scale(var(--disc-scale, 1)); }
    40% { transform: translate(calc(-50% + 8px), -50%) scale(var(--disc-scale, 1)); }
    60% { transform: translate(calc(-50% - 6px), -50%) scale(var(--disc-scale, 1)); }
    80% { transform: translate(calc(-50% + 6px), -50%) scale(var(--disc-scale, 1)); }
  }

  @keyframes flashInOut {
    0% { opacity: 0; transform: translate(-50%, -40%) scale(0.8); }
    18%, 82% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -60%) scale(1.06); }
  }

  @keyframes confettiFly {
    to {
      transform: translate(var(--dx), var(--dy)) rotate(var(--rot));
      opacity: 0;
    }
  }

  @media (max-width: 760px) {
    .app { padding: 10px; gap: 10px; }
    .topbar { flex-direction: column; align-items: stretch; }
    .stats { justify-content: space-between; }
    .controls { justify-content: center; }
    .pill { flex: 1; min-width: 0; }
    .hud { bottom: 10px; padding: 12px 14px; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>🟣 TiFcircles</h1>
        <p>Tap only the biggest circle right now. Every level adds one more moving target.</p>
      </div>
      <div class="stats">
        <div class="pill"><span id="levelValue">1</span><small>Level</small></div>
        <div class="pill"><span id="scoreValue">0</span><small>Score</small></div>
        <div class="pill"><span id="mistakesValue">0</span><small>Mistakes</small></div>
      </div>
      <div class="controls">
        <button id="restartBtn" class="primary">🔄 Restart</button>
      </div>
    </div>

    <div class="board-shell">
      <div id="board"></div>
      <div class="flash" id="flash"></div>
      <div class="hud">
        <div class="message" id="message">Watch the circles breathe. Tap the biggest one.</div>
        <div class="submessage" id="submessage">Level 1 starts with 3 circles. Level 2 has 4, then 5, and so on.</div>
      </div>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const board = document.getElementById('board');
  const levelValue = document.getElementById('levelValue');
  const scoreValue = document.getElementById('scoreValue');
  const mistakesValue = document.getElementById('mistakesValue');
  const messageEl = document.getElementById('message');
  const submessageEl = document.getElementById('submessage');
  const flashEl = document.getElementById('flash');
  const restartBtn = document.getElementById('restartBtn');

  const DISC_COLORS = [
    ['#fb7185', '#e11d48'],
    ['#22d3ee', '#2563eb'],
    ['#34d399', '#059669'],
    ['#fbbf24', '#f97316'],
    ['#c084fc', '#7c3aed'],
    ['#f472b6', '#db2777'],
    ['#a3e635', '#65a30d'],
    ['#f59e0b', '#dc2626']
  ];

  const BASE_COUNT = 3;
  const MAX_LIVES = 3;
  const BASE_MIN = 0.52;
  const BASE_MAX = 1.18;

  let level = 1;
  let score = 0;
  let mistakes = 0;
  let discs = [];
  let rafId = null;
  let boardRect = null;
  let levelLocked = false;
  let gameOver = false;
  let flashTimer = null;

  function randomBetween(min, max) {
    return min + Math.random() * (max - min);
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function updateStats() {
    levelValue.textContent = String(level);
    scoreValue.textContent = String(score);
    mistakesValue.textContent = String(mistakes);
  }

  function setMessage(main, sub) {
    messageEl.textContent = main;
    submessageEl.textContent = sub;
  }

  function showFlash(text, color = '#ffffff') {
    flashEl.textContent = text;
    flashEl.style.color = color;
    flashEl.classList.remove('show');
    void flashEl.offsetWidth;
    flashEl.classList.add('show');
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => flashEl.classList.remove('show'), 1000);
  }

  function createConfetti(x, y) {
    const count = 16;
    for (let i = 0; i < count; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.style.left = x + 'px';
      piece.style.top = y + 'px';
      piece.style.background = `hsl(${Math.round(Math.random() * 360)} 95% 62%)`;
      piece.style.setProperty('--dx', `${randomBetween(-120, 120)}px`);
      piece.style.setProperty('--dy', `${randomBetween(-160, 110)}px`);
      piece.style.setProperty('--rot', `${randomBetween(-400, 400)}deg`);
      piece.style.animation = `confettiFly ${randomBetween(700, 1200)}ms cubic-bezier(.2,.8,.2,1) forwards`;
      board.appendChild(piece);
      setTimeout(() => piece.remove(), 1300);
    }
  }

  function getDiscCountForLevel(currentLevel) {
    return BASE_COUNT + currentLevel - 1;
  }

  function getBiggestActiveDisc() {
    const active = discs.filter(d => !d.removed);
    if (!active.length) return null;
    let biggest = active[0];
    for (const disc of active) {
      if (disc.currentScale > biggest.currentScale) biggest = disc;
    }
    return biggest;
  }

  function clearBoard() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    board.innerHTML = '';
    discs = [];
  }

  function getMaxScaleForLevel(currentLevel) {
    return BASE_MAX + currentLevel * 0.015;
  }

  function buildLevelLayout(total, maxScale) {
    const usableWidth = boardRect.width - 32;
    const usableHeight = boardRect.height - 122;
    const gap = 28;

    let best = null;
    for (let cols = 2; cols <= total; cols++) {
      const rows = Math.ceil(total / cols);
      const cellW = usableWidth / cols;
      const cellH = usableHeight / rows;
      const radiusFromCell = Math.floor((Math.min(cellW, cellH) - gap) / (2 * maxScale));
      if (radiusFromCell < 24) continue;
      if (!best || radiusFromCell > best.radius) {
        best = { cols, rows, cellW, cellH, gap, radius: radiusFromCell };
      }
    }

    if (best) return best;

    const cols = Math.ceil(Math.sqrt(total));
    const rows = Math.ceil(total / cols);
    const cellW = usableWidth / cols;
    const cellH = usableHeight / rows;
    return {
      cols,
      rows,
      cellW,
      cellH,
      gap,
      radius: Math.max(20, Math.floor((Math.min(cellW, cellH) - gap) / (2 * maxScale)))
    };
  }

  function makeDisc(index, total, layout, maxScale) {
    const radius = clamp(layout.radius, 20, 110);
    const row = Math.floor(index / layout.cols);
    const col = index % layout.cols;
    const centerX = 16 + layout.cellW * col + layout.cellW / 2;
    const centerY = 16 + layout.cellH * row + layout.cellH / 2;
    const maxVisualRadius = radius * maxScale;
    const x = clamp(centerX, maxVisualRadius + 10, boardRect.width - maxVisualRadius - 10);
    const y = clamp(centerY, maxVisualRadius + 10, boardRect.height - maxVisualRadius - 80);
    const [c1, c2] = DISC_COLORS[index % DISC_COLORS.length];

    const el = document.createElement('button');
    el.type = 'button';
    el.className = 'disc';
    el.style.width = `${radius * 2}px`;
    el.style.height = `${radius * 2}px`;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    el.style.background = `radial-gradient(circle at 30% 28%, rgba(255,255,255,0.62), ${c1} 40%, ${c2})`;
    el.setAttribute('aria-label', `Circle ${index + 1}`);
    el.textContent = '';
    board.appendChild(el);

    const safeBaseMax = Math.max(BASE_MIN + 0.04, maxScale - 0.08);
    const disc = {
      id: `${level}-${index}-${Date.now()}`,
      el,
      x,
      y,
      radius,
      baseScale: randomBetween(0.72, Math.min(0.94, safeBaseMax)),
      amplitude: randomBetween(0.12, 0.18),
      speed: randomBetween(0.0016, 0.003) + level * 0.00012,
      phase: Math.random() * Math.PI * 2,
      currentScale: 1,
      removed: false,
    };

    el.addEventListener('click', () => handleDiscClick(disc));
    return disc;
  }

  function launchLevel() {
    levelLocked = false;
    gameOver = false;
    clearBoard();
    boardRect = board.getBoundingClientRect();
    const count = getDiscCountForLevel(level);
    const maxScale = getMaxScaleForLevel(level);
    const layout = buildLevelLayout(count, maxScale);
    for (let i = 0; i < count; i++) {
      discs.push(makeDisc(i, count, layout, maxScale));
    }
    updateStats();
    setMessage(
      `Level ${level}: tap the biggest circle.`,
      `${count} circles are breathing bigger and smaller all the time.`
    );
    animate();
  }

  function animate() {
    const biggest = getBiggestActiveDisc();
    const now = performance.now();

    for (const disc of discs) {
      if (disc.removed) continue;
      const wave = Math.sin(now * disc.speed + disc.phase);
      disc.currentScale = clamp(disc.baseScale + wave * disc.amplitude, BASE_MIN, BASE_MAX + level * 0.015);
      disc.el.style.setProperty('--disc-scale', disc.currentScale.toFixed(4));
      disc.el.style.transform = `translate(-50%, -50%) scale(${disc.currentScale})`;
      disc.el.classList.toggle('highlight', false);
      disc.el.style.zIndex = String(Math.round(disc.currentScale * 100));
    }

    rafId = requestAnimationFrame(animate);
  }

  function handleDiscClick(disc) {
    if (disc.removed || gameOver || levelLocked) return;

    const biggest = getBiggestActiveDisc();
    if (!biggest) return;

    if (disc.id === biggest.id) {
      disc.removed = true;
      score += 10;
      updateStats();
      showFlash('Nice! ✨', '#ffffff');

      const rect = disc.el.getBoundingClientRect();
      const boardBox = board.getBoundingClientRect();
      createConfetti(rect.left - boardBox.left + rect.width / 2, rect.top - boardBox.top + rect.height / 2);

      disc.el.classList.add('popped');
      setTimeout(() => disc.el.remove(), 230);

      const remaining = discs.filter(d => !d.removed).length;
      if (remaining === 0) {
        levelLocked = true;
        score += level * 15;
        updateStats();
        showFlash(`Level ${level} clear!`, '#34d399');
        setMessage(
          `Great — you cleared level ${level}.`,
          `Next level will add one more circle.`
        );
        setTimeout(() => {
          level += 1;
          launchLevel();
        }, 1050);
      } else {
        setMessage(
          `Good. Keep tapping the biggest one.`,
          `${remaining} circle${remaining === 1 ? '' : 's'} left.`
        );
      }
    } else {
      mistakes += 1;
      updateStats();
      disc.el.classList.remove('wrong');
      void disc.el.offsetWidth;
      disc.el.classList.add('wrong');
      showFlash('Oops!', '#fb7185');
      setMessage(
        `Not that one — tap the biggest circle.`,
        `Mistakes so far: ${mistakes}. Keep going.`
      );
    }
  }

  function restartGame() {
    level = 1;
    score = 0;
    mistakes = 0;
    gameOver = false;
    levelLocked = false;
    launchLevel();
  }

  restartBtn.addEventListener('click', restartGame);
  window.addEventListener('resize', () => {
    if (gameOver) return;
    clearTimeout(window.__resizeRestartTimer);
    window.__resizeRestartTimer = setTimeout(() => launchLevel(), 150);
  });

  updateStats();
  launchLevel();
})();
</script>
</body>
</html>
